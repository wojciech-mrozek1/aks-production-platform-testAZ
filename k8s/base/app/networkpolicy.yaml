apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: test-app-restrictive
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: test-app

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: app

  egress:
    # allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # allow Postgres
    - to:
        - namespaceSelector:
            matchLabels:
              name: database
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432