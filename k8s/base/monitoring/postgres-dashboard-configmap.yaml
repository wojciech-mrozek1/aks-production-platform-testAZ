apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  postgres-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["postgres"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "PostgreSQL Overview",
      "version": 1
    }
